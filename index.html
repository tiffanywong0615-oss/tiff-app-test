<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>九州六日自駕｜行程小幫手</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #FFF8FB;
      --card: rgba(255,255,255,.94);
      --text: #111827;
      --muted:#6B7280;
      --line: rgba(17, 24, 39, .08);

      --pink:#FF6FAE;
      --pink2:#FFD2E6;
      --yellow:#FFE08A;
      --yellow2:#FFF4C7;

      --blue:#3B82F6;
      --green:#22C55E;
      --danger:#EF4444;

      --shadow: 0 12px 35px rgba(17,24,39,.10);
      --shadow2: 0 4px 14px rgba(17,24,39,.08);

      --r16:16px;
      --r20:20px;
      --pill:999px;

      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:"Inter","Noto Sans TC","Noto Sans JP",system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 18% -10%, rgba(255,111,174,.35), transparent 60%),
        radial-gradient(820px 520px at 88% -5%, rgba(255,224,138,.45), transparent 55%),
        linear-gradient(180deg, rgba(255,248,251,1) 0%, rgba(255,255,255,1) 40%, rgba(255,250,240,1) 100%);
    }
