<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026 九州六日自駕美食之旅</title>

  <!-- Optional fonts (works on GitHub Pages) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --brand:#BC002D;
      --bg:#F6F7FB;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --good:#0ea66a;
      --shadow:0 10px 25px rgba(0,0,0,.08);
      --shadow2:0 2px 10px rgba(0,0,0,.06);
      --radius:18px;
      --radius2:999px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:"Inter","Noto Sans JP",system-ui,-apple-system,"Segoe UI",sans-serif;
      background: radial-gradient(1200px 600px at 15% -10%, rgba(188,0,45,.10), transparent 55%),
                  radial-gradient(900px 500px at 85% 0%, rgba(14,166,106,.10), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    .container{
      max-width: 1020px;
      margin: 0 auto;
      padding: 20px;
    }
    header{
      text-align:center;
      padding: 8px 0 14px;
    }
    h1{
      margin: 10px 0 6px;
      color:var(--brand);
      font-size: clamp(1.5rem, 2.8vw, 2.1rem);
      letter-spacing: .2px;
    }
    .subtitle{
      margin:0;
      color:var(--muted);
      font-size: .98rem;
    }

    /* Summary */
    .summary-grid{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 14px;
      margin: 18px 0 14px;
    }
    .card{
      background:var(--card);
      border:1px solid rgba(229,231,235,.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow2);
      padding: 16px;
    }
    .summary-title{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--radius2);
      background: rgba(188,0,45,.08);
      border: 1px solid rgba(188,0,45,.20);
      color: var(--brand);
      font-weight: 800;
      font-size:.95rem;
      white-space:nowrap;
    }
    .stat-row{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat{
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.75));
    }
    .stat .k{
      color: var(--muted);
      font-size: .85rem;
      margin-bottom: 4px;
    }
    .stat .v{
      font-weight: 900;
      font-size: 1.15rem;
    }
    .hint{
      margin-top: 8px;
      color: var(--muted);
      font-size: .85rem;
      line-height: 1.35;
    }

    /* Filters */
    .filters{
      display:flex;
      flex-wrap:wrap;
      gap: 10px;
      align-items:center;
      justify-content:space-between;
    }
    .search-wrap{
      display:flex;
      gap:10px;
      align-items:center;
      flex: 1 1 360px;
      min-width: 260px;
    }
    .search{
      flex: 1 1 auto;
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background:#fff;
    }
    .search input{
      border:0;
      outline:none;
      width:100%;
